<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Preview Studio</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: white; margin: 0; padding: 20px; }
        .controls { display: flex; align-items: center; gap: 20px; background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 800px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input[type="range"] { flex-grow: 1; }
        iframe { width: 540px; height: 960px; border: 2px solid #444; border-radius: 12px; background: black; transform: scale(0.8); transform-origin: top center; }
        .time-display { font-family: monospace; font-size: 16px; min-width: 100px; }
    </style>
</head>
<body>

    <h1>Render Studio Preview</h1>

    <div class="controls">
        <button id="playBtn">Play</button>
        <input type="range" id="timeline" min="0" max="100" value="0" step="1">
        <div class="time-display" id="timeDisplay">Frame: 0</div>
    </div>

    <iframe id="previewFrame" src="_temp_preview.html"></iframe>

    <script>
        const fps = 30;
        const durationSec = 2.0;
        const totalFrames = fps * durationSec;

        const timeline = document.getElementById('timeline');
        const timeDisplay = document.getElementById('timeDisplay');
        const iframe = document.getElementById('previewFrame');
        const playBtn = document.getElementById('playBtn');

        timeline.max = totalFrames;

        let isPlaying = false;
        let playInterval;

        function updateFrame(frame) {
            timeDisplay.innerText = `Frame: ${frame}`;
            if (iframe.contentWindow && iframe.contentWindow.seekToFrame) {
                iframe.contentWindow.seekToFrame(frame, fps);
            }
        }

        timeline.addEventListener('input', (e) => {
            if (isPlaying) togglePlay();
            updateFrame(parseInt(e.target.value));
        });

        iframe.onload = () => updateFrame(0);

        function togglePlay() {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? "Pause" : "Play";

            if (isPlaying) {
                playInterval = setInterval(() => {
                    let current = parseInt(timeline.value);
                    if (current >= totalFrames) {
                        current = 0;
                    } else {
                        current++;
                    }
                    timeline.value = current;
                    updateFrame(current);
                }, 1000 / fps);
            } else {
                clearInterval(playInterval);
            }
        }

        playBtn.addEventListener('click', togglePlay);
    </script>
</body>
</html>
